<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WealthCollaborate Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "oklch(0.60 0.13 163)", // Emerald requested
                        "primary-hover": "oklch(0.55 0.13 163)",
                        "page-bg": "oklch(0.985 0.001 106.423)", // Pale off-white
                        "card-bg": "oklch(1 0 0)", // Pure white
                        "stone-border": "#e5e7eb",
                        "text-main": "#111816",
                        "text-muted": "#61897e",
                        "background-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ['"Geist Mono"', "monospace"],
                        "body": ['"Geist Mono"', "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.45rem",
                        "sm": "0.25rem",
                        "md": "0.45rem",
                        "lg": "0.6rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft-deep": "0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 10px 20px -5px rgba(0, 0, 0, 0.04)",
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Geist Mono', monospace;
        }
        .form-input-nova {
            @apply w-full rounded-md border border-stone-200 bg-stone-50 py-2.5 px-3 text-sm font-medium text-text-main placeholder-text-muted focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary transition-all;
        }
    </style>
</head>
<body class="bg-page-bg text-text-main font-display antialiased min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<div class="w-full max-w-md space-y-8">
<div class="flex flex-col items-center justify-center text-center">
<div class="relative flex h-12 w-12 items-center justify-center rounded-md bg-gradient-to-br from-emerald-400 to-teal-600 text-white shadow-sm mb-6">
<span class="material-symbols-outlined text-[24px]">diamond</span>
</div>
<h2 class="text-sm font-bold tracking-tight text-text-main uppercase">WealthCollaborate</h2>
</div>
<div class="bg-card-bg rounded-md shadow-soft-deep p-8 sm:p-10 border border-stone-border/50">
<div class="mb-8 text-center">
<h1 class="text-2xl font-bold tracking-tight text-text-main mb-2">Start your financial journey</h1>
<p class="text-xs text-text-muted leading-relaxed">Create an account to manage shared projects and track your wealth securely.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div class="space-y-4">
<div>
<label class="block text-xs font-semibold text-text-main mb-1.5 uppercase tracking-wide" for="full-name">Full Name</label>
<input autocomplete="name" class="form-input-nova" id="full-name" name="name" placeholder="e.g. Elena Rodriguez" required="" type="text"/>
</div>
<div>
<label class="block text-xs font-semibold text-text-main mb-1.5 uppercase tracking-wide" for="email-address">Email Address</label>
<input autocomplete="email" class="form-input-nova" id="email-address" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div>
<label class="block text-xs font-semibold text-text-main mb-1.5 uppercase tracking-wide" for="password">Password</label>
<div class="relative">
<input autocomplete="new-password" class="form-input-nova pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-stone-400 hover:text-text-muted transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
</div>
<div class="pt-2">
<button class="group relative flex w-full justify-center rounded-md bg-primary px-4 py-3 text-sm font-semibold text-white hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all shadow-md shadow-emerald-900/10" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-stone-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-card-bg px-2 text-[10px] text-text-muted font-medium uppercase tracking-wider">Or continue with</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="flex w-full items-center justify-center gap-2 rounded-md bg-white border border-stone-200 px-3 py-2 text-xs font-medium text-text-main shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 transition-all" type="button">
<svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 24 24">
<path clip-rule="evenodd" d="M12.0003 20.45c4.659 0 8.4485-3.8016 8.4485-8.461 0-.6608-.0732-1.3032-.2132-1.9213h-8.2353v3.5612h4.7405c-.1714 1.1444-.7997 2.1293-1.6882 2.7661v2.5317h2.6475c1.603-1.4883 2.525-3.693 2.525-6.2238 0-.4147-.042-.8165-.1144-1.205H3.5518v-2.5317h5.188c-.689-1.8906-2.506-3.2386-4.6395-3.2386-2.7303 0-4.9547 2.2245-4.9547 4.966 0 2.7416 2.2244 4.9662 4.9547 4.9662 1.3283 0 2.533-.5264 3.435-1.385l2.4505 2.4504c-1.579 1.4776-3.6234 2.3846-5.8855 2.3846z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
                        Google
                    </button>
<button class="flex w-full items-center justify-center gap-2 rounded-md bg-white border border-stone-200 px-3 py-2 text-xs font-medium text-text-main shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 transition-all" type="button">
<svg aria-hidden="true" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
<path d="M13.135 6.05675C13.255 6.16175 13.355 6.22675 13.435 6.27175C13.525 6.32175 13.62 6.36175 13.725 6.39675C14.525 6.66675 15.395 6.47175 16.03 5.92675C16.895 5.18675 17.205 4.02675 16.795 2.95175C16.745 2.82175 16.685 2.69675 16.615 2.58175C16.51 2.40675 16.375 2.24675 16.22 2.11175C15.345 1.36175 14.07 1.36175 13.195 2.11175C13.065 2.22175 12.95 2.34675 12.85 2.48175C12.28 3.25675 12.28 4.30675 12.85 5.08175C12.925 5.18175 13.01 5.27175 13.1 5.35175C13.11 5.36175 13.12 5.37175 13.135 6.05675ZM18.445 12.2867C18.445 14.6168 20.36 16.0317 20.435 16.0717C20.425 16.1017 20.395 16.2067 20.345 16.3667C19.95 17.5117 18.895 19.5967 17.155 19.6267C16.48 19.6367 16.26 19.4267 15.485 19.4267C14.705 19.4267 14.465 19.6167 13.82 19.6467C12.16 19.7267 10.975 17.6567 10.975 17.6567C10.975 17.6267 10.22 14.7818 11.905 13.7918C12.78 13.2767 13.885 13.4367 14.28 13.5667C14.935 13.7867 15.545 14.1367 16.135 14.1367C16.66 14.1367 17.42 13.9167 18.175 13.5767C18.255 13.5417 18.33 13.5118 18.4 13.4918C18.42 13.4318 18.425 13.3767 18.435 13.3167C18.455 12.9667 18.445 12.6167 18.445 12.2867Z"></path>
</svg>
                        Apple
                    </button>
</div>
</div>
</div>
<p class="text-center text-xs text-text-muted">
            Already have an account? 
            <a class="font-semibold text-primary hover:text-primary-hover transition-colors" href="#">Log in</a>
</p>
</div>

</body></html>
